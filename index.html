    font-family:Arial,Helvetica,sans-serif;

.card{

}

.status{
    color:#00ff99;
}

.wallet-title{
    color:#f7931a;
    margin-bottom:10px;
}

.wallet{
    background:#000;
    padding:15px;
    border-radius:10px;
    font-family:monospace;
    word-break:break-all;
    color:#ddd;
    font-size:14px;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#f7931a;
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#ffad32;
}

.whatsapp{
    text-decoration:none;
}

.whatsapp button{
    background:#25D366;
}

.whatsapp button:hover{
    background:#1da851;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:13px;
